name: Actualizar concursos literarios

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descargar paginas de concursos
        run: |
          curl -s --max-time 30 -A "Mozilla/5.0" "https://www.escritores.org/concursos/concursos-1/concursos-literarios" > /tmp/fuente1.html || echo "" > /tmp/fuente1.html
          curl -s -L --max-time 30 -A "Mozilla/5.0" "https://culturamas.es/category/concursos/" > /tmp/fuente2.html
          echo "Fuente1: $(wc -c < /tmp/fuente1.html) bytes"
          echo "Fuente2: $(wc -c < /tmp/fuente2.html) bytes"

      - name: Buscar concursos con IA
        timeout-minutes: 4
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/buscar-concursos.js

      - name: Guardar cambios si hay concursos nuevos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --staged --quiet || git commit -m "Actualización automática de concursos $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
