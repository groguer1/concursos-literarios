name: Actualizar concursos literarios

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Listar archivos para depurar
        run: ls -R

      - name: Buscar concursos con IA
        timeout-minutes: 3
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/buscar-concursos.js

      - name: Guardar cambios si hay concursos nuevos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --staged --quiet || git commit -m "Actualizacion automatica de concursos $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
