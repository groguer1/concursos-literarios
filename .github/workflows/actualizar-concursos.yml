name: Actualizar concursos literarios

on:
  schedule:
    - cron: '0 6 * * *' # Se ejecuta a las 6:00 AM cada día
  workflow_dispatch:     # Permite ejecutarlo manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Paso opcional de depuración: Lista los archivos para confirmar rutas
      - name: Verificar archivos
        run: ls -R

      - name: Buscar concursos con IA
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        # Usamos ./ para asegurar ruta relativa desde la raíz
        run: node ./scripts/buscar-concursos.js

      - name: Guardar cambios si hay concursos nuevos
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          # El comando diff --quiet devuelve 1 si hay cambios, permitiendo el commit
          if ! git diff --cached --quiet; then
            git commit -m "Actualización automática de concursos $(date +'%d/%m/%Y')"
            git push
          else
            echo "No hay cambios para subir"
          fi
