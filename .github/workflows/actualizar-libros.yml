name: Actualizar novedades literarias

on:
  schedule:
    # Ejecutar cada 10 dias a las 7:00 AM hora española (6:00 UTC)
    - cron: '0 6 1,11,21 * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descargar pagina de novedades
        run: |
          curl -s -L --max-time 30 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.casadellibro.com/novedades/literatura" > /tmp/libros.html || echo "" > /tmp/libros.html
          echo "Descargado: $(wc -c < /tmp/libros.html) bytes"

      - name: Buscar libros con IA
        timeout-minutes: 4
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/buscar-libros.js

      - name: Guardar cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add libros.html
          git diff --staged --quiet || git commit -m "Actualizacion automatica de novedades $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
